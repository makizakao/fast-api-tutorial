name: Run Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker環境のセットアップ (ubuntu-latestには標準でDockerが入っています)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Compose でコンテナを起動
      #    -d でバックグラウンド起動し、DBが立ち上がるまで数秒待ちます
      - name: Start containers
        run: |
          docker compose up --build -d
          sleep 5

      # 4. テストの実行
      #    ローカル同様に PYTHONPATH を指定して pytest を実行します
      - name: Run pytest
        run: |
          docker compose exec -T web env PYTHONPATH=. pytest

      # 5. 後片付け
      - name: Stop containers
        run: docker compose down